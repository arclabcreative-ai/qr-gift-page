<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ของขวัญเล็กๆ สำหรับเธอ</title>
    <style>
      :root {
        --background: #f9f1ec;
        --background-glow: #fff9f5;
        --card: rgba(255, 252, 250, 0.8);
        --blessing: #fffaf7;
        --text: #534442;
        --muted: #826c69;
        --accent: #d7b8b1;
        --shadow: 0 18px 44px rgba(102, 68, 61, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background:
          radial-gradient(circle at 50% 16%, var(--background-glow), transparent 42%),
          var(--background);
        color: var(--text);
        font-family: "Noto Sans Thai", "Sarabun", "Thonburi", "Tahoma", sans-serif;
      }

      .surprise-card {
        position: relative;
        isolation: isolate;
        touch-action: manipulation;
        user-select: none;
        width: min(100%, 26rem);
        padding: clamp(1rem, 4vw, 1.4rem);
        border: 0;
        border-radius: 1.8rem;
        background: var(--card);
        box-shadow: var(--shadow);
        cursor: pointer;
        text-align: center;
        -webkit-tap-highlight-color: transparent;
      }

      .surprise-card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 4px;
      }

      .reveal-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        opacity: 1;
        transform: translateY(0);
        transition: opacity 360ms ease, transform 360ms ease;
      }

      .reveal-area.is-fading {
        opacity: 0;
        transform: translateY(5px);
      }

      .initial-message {
        margin: 0.25rem 0 0;
        font-size: clamp(1.02rem, 4.4vw, 1.12rem);
        line-height: 1.8;
        color: var(--text);
      }

      .initial-message span {
        display: block;
        color: var(--muted);
        font-size: 0.96em;
      }

      .surprise-image {
        display: block;
        width: auto;
        max-width: 100%;
        max-height: min(58svh, 33rem);
        object-fit: contain;
        border-radius: 1.25rem;
      }

      .blessing-card {
        width: 100%;
        position: relative;
        z-index: 1;
        margin-top: clamp(-2.45rem, -8vw, -1.95rem);
        padding: clamp(1.1rem, 5vw, 1.35rem);
        border-radius: 1.35rem;
        background: var(--blessing);
        border: 1px solid rgba(215, 184, 177, 0.32);
        color: var(--text);
        font-size: clamp(1rem, 4.1vw, 1.06rem);
        line-height: 1.8;
        text-align: center;
      }

      .blessing-card p {
        margin: 0;
      }

      .blessing-card p + p {
        margin-top: 0.9rem;
      }

      .floating-heart {
        position: absolute;
        z-index: 2;
        left: 0;
        top: 0;
        color: rgba(204, 143, 151, 0.78);
        font-size: var(--heart-size);
        line-height: 1;
        pointer-events: none;
        opacity: 0;
        text-shadow: 0 3px 10px rgba(198, 132, 143, 0.16);
        animation:
          splash-heart var(--heart-duration) cubic-bezier(0.15, 0.62, 0.32, 1)
          var(--heart-delay) forwards;
      }

      @keyframes splash-heart {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.22) rotate(0deg);
        }

        18% {
          opacity: var(--heart-opacity);
        }

        100% {
          opacity: 0;
          transform:
            translate(calc(-50% + var(--heart-x)), calc(-50% + var(--heart-y)))
            scale(var(--heart-scale))
            rotate(var(--heart-turn));
        }
      }

      [hidden] {
        display: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .reveal-area {
          transition-duration: 1ms;
        }

        .floating-heart {
          animation-duration: 1ms;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="surprise-card"
      id="surpriseCard"
      role="button"
      tabindex="0"
      aria-label="แตะเพื่อเปิดข้อความพิเศษ"
    >
      <section class="reveal-area" id="revealArea">
        <!-- Edit the before-tap message below. -->
        <p class="initial-message" id="initialMessage">
          มีบางอย่างเล็กๆ ที่อยากให้เธอได้เห็น
          <span>ลองแตะเบาๆ ตรงนี้นะ</span>
        </p>

        <img
          class="surprise-image"
          id="surpriseImage"
          src="assets/Meow.png"
          alt="ภาพน่ารักที่ซ่อนข้อความพิเศษไว้"
        >

        <!-- Edit the after-tap blessing below. Keep each thought in its own paragraph. -->
        <div class="blessing-card" id="blessingMessage" hidden>
          <p>ขอให้ทุกวันของเธอมีเหตุผลให้ยิ้มได้เสมอนะ</p>
          <p>
            ถึงตอนนี้เราอาจจะยังค่อยๆ เรียนรู้กันไป<br>
            แต่เราก็อยากเป็นหนึ่งใน<br>
            ความสบายใจเล็กๆ ของเธอ
          </p>
          <p>ในวันที่เธอเหนื่อยหรืออยากพักใจ</p>
        </div>
      </section>
    </main>

    <script>
      const surpriseCard = document.getElementById("surpriseCard");
      const revealArea = document.getElementById("revealArea");
      const surpriseImage = document.getElementById("surpriseImage");
      const initialMessage = document.getElementById("initialMessage");
      const blessingMessage = document.getElementById("blessingMessage");

      // Edit the image file names here if you replace or rename either PNG.
      const firstImage = "assets/Meow.png";
      const afterImage = "assets/Forget_Me_Not_&_Iris_Flower.png";

      let hasChanged = false;
      let holdTimer = null;
      let holdInterval = null;
      let heldPointer = null;
      let isHolding = false;
      let ignoreClicksUntil = 0;

      surpriseImage.src = firstImage;

      const preloadedAfterImage = new Image();
      preloadedAfterImage.decoding = "async";
      const afterImageReady = new Promise((resolve) => {
        preloadedAfterImage.addEventListener("load", async () => {
          try {
            await preloadedAfterImage.decode();
          } catch (error) {
            // The loaded image can still be displayed if decode() is unavailable.
          }
          resolve();
        }, { once: true });
        preloadedAfterImage.addEventListener("error", resolve, { once: true });
      });
      preloadedAfterImage.src = afterImage;

      function createHeartBurst(clientX, clientY, isHoldBurst = false) {
        const cardBounds = surpriseCard.getBoundingClientRect();
        const originX = clientX - cardBounds.left;
        const originY = clientY - cardBounds.top;
        const count = isHoldBurst ? 7 : 10;
        const startingAngle = Math.random() * Math.PI * 2;

        for (let index = 0; index < count; index += 1) {
          const heart = document.createElement("span");
          const angle = startingAngle + (Math.PI * 2 * index) / count + (Math.random() - 0.5) * 0.24;
          const distance = (isHoldBurst ? 48 : 72) + Math.random() * (isHoldBurst ? 54 : 58);
          const travelX = Math.cos(angle) * distance;
          const travelY = Math.sin(angle) * distance - 8;

          heart.className = "floating-heart";
          heart.textContent = "\u2661";
          heart.setAttribute("aria-hidden", "true");
          heart.style.left = `${originX}px`;
          heart.style.top = `${originY}px`;
          heart.style.setProperty("--heart-size", `${0.86 + Math.random() * 0.7}rem`);
          heart.style.setProperty("--heart-delay", `${Math.random() * 42}ms`);
          heart.style.setProperty("--heart-duration", `${780 + Math.random() * 360}ms`);
          heart.style.setProperty("--heart-opacity", `${0.48 + Math.random() * 0.34}`);
          heart.style.setProperty("--heart-scale", `${0.86 + Math.random() * 0.44}`);
          heart.style.setProperty("--heart-x", `${travelX}px`);
          heart.style.setProperty("--heart-y", `${travelY}px`);
          heart.style.setProperty("--heart-turn", `${(Math.random() - 0.5) * 38}deg`);

          surpriseCard.appendChild(heart);
          heart.addEventListener("animationend", () => heart.remove(), { once: true });
        }
      }

      async function revealBlessing() {
        if (hasChanged) {
          return;
        }

        hasChanged = true;
        await afterImageReady;
        revealArea.classList.add("is-fading");

        window.setTimeout(() => {
          surpriseImage.src = afterImage;
          surpriseImage.alt = "ช่อดอกไม้สำหรับคำอวยพรแสนอบอุ่น";
          initialMessage.hidden = true;
          blessingMessage.hidden = false;
          surpriseCard.setAttribute("aria-label", "ข้อความอวยพรได้เปิดแล้ว");

          window.requestAnimationFrame(() => {
            revealArea.classList.remove("is-fading");
          });
        }, 360);
      }

      function startHoldEffect(event) {
        if (!hasChanged || blessingMessage.hidden || event.button > 0) {
          return;
        }

        heldPointer = {
          id: event.pointerId,
          x: event.clientX,
          y: event.clientY
        };

        holdTimer = window.setTimeout(() => {
          isHolding = true;
          createHeartBurst(heldPointer.x, heldPointer.y, true);
          holdInterval = window.setInterval(() => {
            createHeartBurst(heldPointer.x, heldPointer.y, true);
          }, 180);
        }, 360);
      }

      function updateHoldPosition(event) {
        if (heldPointer && heldPointer.id === event.pointerId) {
          heldPointer.x = event.clientX;
          heldPointer.y = event.clientY;
        }
      }

      function stopHoldEffect() {
        const endedHolding = isHolding;

        window.clearTimeout(holdTimer);
        window.clearInterval(holdInterval);
        holdTimer = null;
        holdInterval = null;
        heldPointer = null;
        isHolding = false;

        if (endedHolding) {
          ignoreClicksUntil = performance.now() + 600;
        }
      }

      surpriseCard.addEventListener("pointerdown", startHoldEffect);
      surpriseCard.addEventListener("pointermove", updateHoldPosition);
      surpriseCard.addEventListener("pointerup", stopHoldEffect);
      surpriseCard.addEventListener("pointercancel", stopHoldEffect);
      surpriseCard.addEventListener("pointerleave", stopHoldEffect);

      surpriseCard.addEventListener("click", (event) => {
        if (hasChanged) {
          if (!blessingMessage.hidden && performance.now() >= ignoreClicksUntil) {
            createHeartBurst(event.clientX, event.clientY);
          }
          return;
        }

        revealBlessing();
      });

      surpriseCard.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          revealBlessing();
        }
      });
    </script>
  </body>
</html>
